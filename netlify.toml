[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — also set in CSP via frame-ancestors
    X-Frame-Options = "DENY"

    # Prevent browsers from MIME-sniffing response content-type
    X-Content-Type-Options = "nosniff"

    # Don't leak full URL (with any query params) to third-party sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Content Security Policy
    # - style-src needs 'unsafe-inline' because App.jsx uses inline JS style objects
    # - connect-src allows Supabase REST + realtime WebSocket
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://xhouuigwhjwsmttdpudl.supabase.co wss://xhouuigwhjwsmttdpudl.supabase.co; img-src 'self' data: blob:; font-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self';"

    # Disable browser features this app doesn't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
