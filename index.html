<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A1F44" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="כרישים בניקיון" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <style>
      /* Anti-zoom: block all text size auto-adjustment */
      *, *::before, *::after {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      /* iOS PWA viewport shift fix: html must be taller than 100% by safe-area-inset-top
         to compensate for iOS pushing content up behind the status bar */
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: calc(100% + env(safe-area-inset-top));
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        max-width: 100vw;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        max-width: 100vw;
      }

      /* Scroll container: compensates for same upward shift */
      #root {
        width: 100%;
        height: calc(100dvh + env(safe-area-inset-top));
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
      }

      /* Force 16px on all form fields — kills iOS auto-zoom */
      input, select, textarea {
        font-size: 16px !important;
        -webkit-text-size-adjust: 100%;
        touch-action: manipulation;
      }

      /* Prevent double-tap zoom + constrain children */
      #root * {
        max-width: 100%;
        box-sizing: border-box;
        touch-action: manipulation;
      }

      /* Mobile: full-bleed */
      .app-shell {
        min-height: 100dvh;
        overflow-x: hidden;
      }

      /* Bottom-sheet slide-up animation for DayModal */
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
      .modal-sheet {
        animation: slideUp 0.32s cubic-bezier(0.32, 0.72, 0, 1);
        will-change: transform;
      }

      /* Desktop: centered card with gutter */
      @media (min-width: 600px) {
        #root {
          background: #D0D8E4;
        }
        .app-shell {
          max-width: 500px;
          margin: 0 auto;
          box-shadow: 0 0 60px rgba(10,31,68,0.18);
          min-height: 100dvh;
        }
      }
    </style>

    <title>כרישים בניקיון</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="/touch-lock.js"></script>
    <script type="module" src="/src/main.jsx"></script>
    <script src="/register-sw.js"></script>
  </body>
</html>
