<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme: dark)" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="כרישים בניקיון" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <style>
      /* Anti-zoom: block all text size auto-adjustment */
      *, *::before, *::after {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      /* iOS PWA viewport shift fix: html must be taller than 100% by safe-area-inset-top
         to compensate for iOS pushing content up behind the status bar */
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: calc(100% + env(safe-area-inset-top));
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        max-width: 100vw;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        max-width: 100vw;
      }

      /* Scroll container: compensates for same upward shift */
      #root {
        width: 100%;
        height: calc(100dvh + env(safe-area-inset-top));
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
      }

      /* Force 16px on all form fields — kills iOS auto-zoom */
      input, select, textarea {
        font-size: 16px !important;
        -webkit-text-size-adjust: 100%;
        touch-action: manipulation;
      }

      /* Prevent double-tap zoom — only on interactive elements, NOT everything */
      #root button, #root input, #root select, #root textarea, #root a, #root [role="button"] {
        touch-action: manipulation;
      }
      #root * {
        max-width: 100%;
        box-sizing: border-box;
      }

      /* Mobile: full-bleed */
      .app-shell {
        min-height: 100dvh;
        overflow-x: hidden;
      }

      /* Bottom-sheet slide-up animation for DayModal */
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
      .modal-sheet {
        animation: slideUp 0.32s cubic-bezier(0.32, 0.72, 0, 1);
        will-change: transform;
      }

      /* Toast slide-down */
      @keyframes toastIn {
        0% { opacity: 0; transform: translate(-50%, -8px) scale(0.96); }
        100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
      }

      /* Button press effect — native iOS feel */
      button:active {
        transform: scale(0.97);
        opacity: 0.85;
        transition: transform 0.08s ease, opacity 0.08s ease;
      }
      button {
        transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), opacity 0.18s ease;
      }
      /* Native iOS scroll: NO smooth-scroll — let WebKit handle momentum */
      /* (-webkit-overflow-scrolling: touch on #root gives native inertia) */

      /* Disable button press effect on tab bar — handled separately */
      .app-shell > div:last-of-type button:active { transform: none; opacity: 1; }

      /* Wave3: keyboard focus accessibility */
      button:focus-visible, input:focus-visible, textarea:focus-visible, a:focus-visible, [role="button"]:focus-visible {
        outline: 2px solid #007AFF;
        outline-offset: 2px;
        border-radius: 8px;
      }
      input:focus-visible { outline-offset: 0; }

      /* Wave4: Dark mode preview support — full dark UI is a separate effort, but ensure media meta is correct.
         For now: only the splash bg + safari bar adapts (via theme-color meta tags above).
         Future: invert C tokens via JS toggle reading prefers-color-scheme. */

      /* Wave3: respect prefers-reduced-motion (a11y) */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        button:active { transform: none; }
        .modal-sheet, .action-sheet { animation: none; }
      }

      /* Sticky stack: header + week-nav stay locked at top while scrolling */
      .sticky-stack { position: sticky; top: 0; z-index: 100; }
      .sticky-week { position: sticky; z-index: 95; }

      /* Action sheet — slides from bottom */
      @keyframes sheetIn {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .action-sheet-backdrop {
        animation: fadeIn 0.2s ease-out;
      }
      .action-sheet {
        animation: sheetIn 0.32s cubic-bezier(0.32, 0.72, 0, 1);
        will-change: transform;
      }
      /* Spin (loading) */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      /* Skeleton shimmer */
      @keyframes shimmer {
        0% { background-position: -200px 0; }
        100% { background-position: 200px 0; }
      }
      .skeleton {
        background: linear-gradient(90deg, #F0F0F2 25%, #E5E5EA 50%, #F0F0F2 75%);
        background-size: 200px 100%;
        animation: shimmer 1.4s ease-in-out infinite;
        border-radius: 8px;
      }

      /* Desktop: centered card with gutter */
      @media (min-width: 600px) {
        #root {
          background: #D0D8E4;
        }
        .app-shell {
          max-width: 500px;
          margin: 0 auto;
          box-shadow: 0 0 60px rgba(10,31,68,0.18);
          min-height: 100dvh;
        }
      }
    </style>

    <title>כרישים בניקיון</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="/touch-lock.js"></script>
    <script type="module" src="/src/main.jsx"></script>
    <script src="/register-sw.js"></script>
  </body>
</html>
